{% extends "label/label_base.html" %}

{% load l10n i18n barcode %}

{% block style %}

.barcode {
    position: absolute;
    left: 0mm;
    top: 0mm;
    {% localize off %}
    height: {{ height }}mm;
    width: {{ width }}mm;
    {% endlocalize %}
}

{% endblock style %}

{% block content %}

<img class='barcode' alt="{% trans 'Barcode' %}" src='{% barcode qr_data %}'>
{% endblock content %}
